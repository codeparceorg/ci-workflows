# .github/workflows/node-build.yml
name: Build node project


on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      DOPPLER_CONFIG: ${{ github.ref_name }}_${{ github.event.repository.name }}
    name: Node Build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run with secrets
        run: |
          doppler secrets download -p vault-codeparce -c "$DOPPLER_CONFIG" --no-file --format env > .env || cat .env

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm i

      - name: Build Project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist
          retention-days: 1
          