name: Fullstack Pipeline

on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string
      cloud:
        type: string
      services:
        type: string

jobs:
  build:
    uses: ./.github/workflows/ci-build-node.yml
    with:
      doppler-project: vault-codeparce
    secrets: inherit

  infra:
    uses: ./.github/workflows/infra-az-swa.yml
    secrets: inherit

  deploy:
    uses: codeparce/ci-workflows/.github/actions/azure/swa@v1
    needs: [build, infra]
    secrets: inherit
