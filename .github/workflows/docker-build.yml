# .github/workflows/docker-build.yml
name: Docker publish 


on:
  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: 'any'
        
jobs:
  build:
    runs-on: ubuntu-latest
    name: Docker build and push
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      APP_ENVIRONMENT: ${{ github.ref_name }}_${{ github.event.repository.name }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: service-build
          path: ${{ inputs.target }}

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run with secrets
        run: |
          doppler secrets download -p vault-codeparce -c "$APP_ENVIRONMENT" --no-file --format env -t "$DOPPLER_TOKEN" > .env 
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ACCOUNT_NAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_ACCOUNT_NAME }}/${{ github.event.repository.name }}:${{ github.ref_name }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_ACCOUNT_NAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}
          
    