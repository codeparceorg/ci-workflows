# .github/workflows/docker-build.yml
name: Docker publish 


on:
  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: 'any'
        
jobs:
  build:
    runs-on: ubuntu-latest
    name: Docker build and push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: service-build
          path: ${{ inputs.target }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ACCOUNT_NAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_ACCOUNT_NAME }}/${{ github.event.repository.name }}:${{ github.ref_name }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_ACCOUNT_NAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}
          
    