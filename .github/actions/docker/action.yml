# .github/workflows/docker-build.yml
name: Docker publish 

runs:
  using: "composite"
  steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ACCOUNT_NAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_ACCOUNT_NAME }}/${{ github.event.repository.name }}:${{ github.ref_name }} .
        shell: bash

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_ACCOUNT_NAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}
        shell: bash