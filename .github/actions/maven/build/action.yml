name: Java setup

inputs:
  java-version:
    required: false
    type: string
    default: '17'

runs:
  using: "composite"
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java-version }}
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests -Djar.name=app
      shell: bash

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: service-build
        path: target/*.jar
        retention-days: 1
          
